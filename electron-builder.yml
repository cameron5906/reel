appId: com.reel.recorder
productName: Reel
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/node_modules/ffmpeg-static/**"
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}
publish:
  provider: github
  owner: cameron5906
  repo: reel
