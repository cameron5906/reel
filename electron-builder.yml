appId: com.reel.recorder
productName: Reel
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/node_modules/ffmpeg-static/**"
win:
  target:
    - nsis
nsis:
  oneClick: true              # install and launch automatically, no finish-page checkbox to miss
  perMachine: false           # per-user install, no UAC prompt
  runAfterFinish: true        # auto-launch Reel when the install completes
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: ${productName}-Setup-${version}.${ext}
publish:
  provider: github
  owner: cameron5906
  repo: reel
